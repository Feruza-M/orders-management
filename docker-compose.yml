services:
  db:
    image: postgres:15
    container_name: orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_app
      POSTGRES_PASSWORD: orders_password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql

  app:
    image: filizmamedova/orders-management:${APP_VERSION}
    container_name: orders-app
    environment:
      APP_ADDR: ":8080"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: orders_db
      DB_USER: orders_app
      DB_PASSWORD: orders_password
      DB_SSLMODE: disable
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: orders-nginx
    ports:
      - "8082:80"
    volumes:
      - ./deploy/nginx/orders.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data:
